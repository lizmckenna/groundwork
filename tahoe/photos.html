<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
  <title>Photos · Tahoe 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="brand-mark">🌲</span>
      <span>Tahoe 2026</span>
    </div>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="chores.html">Chores</a>
      <a href="schedule.html">Schedule</a>
      <a href="lodging.html">Lodging</a>
      <a href="photos.html" class="active">Photos</a>
    </nav>
  </div>
</header>

<main class="shell">

  <section class="hero">
    <div class="eyebrow">Memories from the lake</div>
    <h1>Tahoe reunions, past and future.</h1>
    <p class="meta">Click an album to open it. Add new shots to whichever album the host shares for this year.</p>
  </section>

  <section class="section">
    <div class="album-grid" id="album-grid"></div>
  </section>

  <footer class="foot">
    <div>📸 Take more photos this year. Tag your kids by name when you upload.</div>
  </footer>

</main>

<script src="config.js"></script>
<script>
  (function () {
    const cfg = window.TAHOE_CONFIG;
    const grid = document.getElementById("album-grid");
    const albums = cfg.photoAlbums || [];
    if (albums.length === 0) {
      grid.innerHTML = `<div class="card"><div class="lead">No albums yet. Drop a Google Photos / Drive / iCloud link into <code>config.js</code> to add one.</div></div>`;
      return;
    }
    grid.innerHTML = albums.map(a => `
      <a class="album-card" href="${a.url}" target="_blank" rel="noopener">
        <div class="year-tag">${a.year}</div>
        <div class="title">${a.label}</div>
        <div class="open-tag">Open ${a.kind === "icloud" ? "iCloud" : a.kind === "google" ? "Google" : "album"} →</div>
      </a>
    `).join("");
  })();
</script>

</body>
</html>
