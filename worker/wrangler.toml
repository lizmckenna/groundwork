name = "groundwork-pilot"
main = "index.js"
compatibility_date = "2025-01-01"
keep_vars = true

[triggers]
crons = ["0 14 * * *"]   # daily 9am CT — pre-event signup-pipeline self-test (canary)

[[kv_namespaces]]
binding = "KV_BINDING"
id = "62821503789649ffa80d2882919a8741"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true
